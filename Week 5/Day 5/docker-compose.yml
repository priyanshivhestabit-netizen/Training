services:

  client:
    build: ./client
    restart: always

  server:
    build: ./server
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - client
      - server

volumes:
  mongo-data: